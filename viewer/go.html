<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReSA 安装</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .go-page {
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1rem;
      text-align: center;
    }
    .go-page h1 { margin-bottom: 0.75rem; }
    .go-page p { color: #cbd5e1; line-height: 1.7; }
    .go-page .highlight { color: #fbbf24; font-weight: 600; }
    .cmd-box {
      margin: 1rem 0;
      padding: 0.75rem;
      background: #0f172a;
      border-radius: 6px;
      font-family: Consolas, monospace;
      font-size: 0.82rem;
      word-break: break-all;
      text-align: left;
      user-select: all;
    }
    .go-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 1rem; }
    .go-actions a, .go-actions button {
      padding: 0.65rem 1.1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .go-actions a { background: #2563eb; color: #fff; }
    .go-actions button { background: #475569; color: #fff; }
    .note { font-size: 0.9rem; color: #94a3b8; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="go-page">
    <h1>ReSA 安装</h1>
    <p id="status">正在下载安装脚本…</p>
    <p>下载后<strong>双击</strong> <code>ReSA-Install.bat</code>，将<strong>静默安装</strong>（无黑窗口）。</p>

    <p class="note">Win+R 粘贴下面整行，可免双击、无窗口安装：</p>
    <div class="cmd-box" id="cmdLine"></div>
    <div class="go-actions">
      <button type="button" id="copyCmdBtn">复制命令</button>
      <a id="redownloadBtn" href="/download/install.bat" download>重新下载 bat</a>
    </div>
  </div>

  <script>
    const origin = location.origin;
    const batUrl = origin + "/download/install.bat";
    const cmdLine =
      'powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri \'' + origin + '/download/install.ps1\' -OutFile $env:TEMP\\ReSA-install.ps1 -UseBasicParsing; powershell -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -File $env:TEMP\\ReSA-install.ps1 -BaseUrl \'' + origin + '/download\' -Silent"';

    document.getElementById("cmdLine").textContent = cmdLine;

    function triggerDownload() {
      const link = document.createElement("a");
      link.href = batUrl;
      link.download = "ReSA-Install.bat";
      document.body.appendChild(link);
      link.click();
      link.remove();
      document.getElementById("status").textContent = "安装脚本已触发下载，请双击运行。";
    }

    triggerDownload();

    document.getElementById("copyCmdBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(cmdLine);
        document.getElementById("copyCmdBtn").textContent = "已复制";
        setTimeout(() => {
          document.getElementById("copyCmdBtn").textContent = "复制命令";
        }, 1500);
      } catch {
        window.prompt("复制以下内容:", cmdLine);
      }
    });
  </script>
</body>
</html>
